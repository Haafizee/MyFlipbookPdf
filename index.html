<!DOCTYPE html>.
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFlipbook - Penukar PDF ke Buku Selak Interaktif</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
    .flipbook-container { width: 100%; max-width: 900px; height: 600px; margin: 0 auto; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }
    .page { background-color: white; border: 1px solid #e2e8f0; overflow: hidden; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Navigasi -->
  <nav class="bg-indigo-600 text-white shadow-md p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2">📖 MyFlipbook</h1>
      <div id="auth-section">
        <button id="login-btn" class="bg-white text-indigo-600 px-4 py-2 rounded-lg font-semibold shadow hover:bg-gray-100 transition">
          Log Masuk Google
        </button>
        <div id="user-info" class="hidden flex items-center gap-3">
          <span id="user-name" class="text-sm font-medium"></span>
          <button id="logout-btn" class="bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded text-sm transition">
            Log Keluar
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Kandungan Utama -->
  <main class="max-w-6xl mx-auto p-6 flex-grow w-full">
    
    <!-- Seksyen Muat Naik -->
    <section id="upload-section" class="hidden bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
      <h2 class="text-lg font-bold text-gray-800 mb-4">Muat Naik PDF Baru</h2>
      <form id="upload-form" class="flex flex-col md:flex-row gap-4 items-center">
        <input type="text" id="book-title" placeholder="Tajuk Buku (cth: Laporan 2026)" required
               class="w-full md:w-1/2 p-2.5 border border-gray-300 rounded-lg focus:ring-2 outline-none">
        <input type="file" id="pdf-file" accept="application/pdf" required
               class="w-full md:w-1/3 p-2 border border-gray-300 rounded-lg text-sm">
        <button type="submit" id="submit-btn" 
                class="w-full md:w-auto bg-indigo-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition">
          Muat Naik
        </button>
      </form>
      <div id="upload-progress" class="hidden mt-4 text-sm text-indigo-600 font-medium">Memuat naik...</div>
    </section>

    <!-- Senarai Buku -->
    <section id="dashboard-section">
      <h2 class="text-xl font-bold text-gray-800 mb-4">Senarai Buku Selak</h2>
      <div id="books-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <p class="text-gray-500 text-sm col-span-full">Sila log masuk untuk melihat buku.</p>
      </div>
    </section>

    <!-- Pemapar Buku Selak -->
    <section id="viewer-section" class="hidden flex flex-col items-center">
      <div class="w-full flex justify-between items-center mb-4">
        <h2 id="viewer-title" class="text-xl font-bold text-gray-800"></h2>
        <button id="close-viewer-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg text-sm font-semibold transition">
          ← Kembali
        </button>
      </div>
      <div class="flex gap-4 mb-4 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-200">
        <button id="prev-page" class="text-gray-700 hover:text-indigo-600 font-bold px-3 py-1">◀ Sebelumnya</button>
        <span id="page-counter" class="text-sm font-medium text-gray-600 self-center">Halaman 1</span>
        <button id="next-page" class="text-gray-700 hover:text-indigo-600 font-bold px-3 py-1">Seterusnya ▶</button>
      </div>
      <div id="flipbook" class="flipbook-container rounded-lg"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-storage.js";

    // Konfigurasi sebenar anda
    const firebaseConfig = {
      apiKey: "AIzaSyDPLNOcIsmNlk2caaX-2ftsKCTcnyPWyTc",
      authDomain: "myflipbook-46cdc.firebaseapp.com",
      projectId: "myflipbook-46cdc",
      storageBucket: "myflipbook-46cdc.firebasestorage.app",
      messagingSenderId: "995308025030",
      appId: "1:995308025030:web:a40e1f790af1b9873713c7",
      measurementId: "G-7QD937QKZY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let pageFlipInstance = null;

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userInfo = document.getElementById('user-info');
    const userName = document.getElementById('user-name');
    const uploadSection = document.getElementById('upload-section');

    loginBtn.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (error) {
        console.error("Login Error:", error);
        alert("Ralat log masuk: " + error.message);
      }
    });

    logoutBtn.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        loginBtn.classList.add('hidden');
        userInfo.classList.remove('hidden');
        userName.textContent = user.displayName;
        uploadSection.classList.remove('hidden');
        loadBooks();
      } else {
        loginBtn.classList.remove('hidden');
        userInfo.classList.add('hidden');
        uploadSection.classList.add('hidden');
        document.getElementById('books-grid').innerHTML = '<p class="text-gray-500 text-sm col-span-full">Sila log masuk untuk melihat buku.</p>';
      }
    });

    const uploadForm = document.getElementById('upload-form');
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;
      const file = document.getElementById('pdf-file').files[0];
      const title = document.getElementById('book-title').value;
      
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('upload-progress').classList.remove('hidden');

      try {
        const storageRef = ref(storage, `pdfs/${Date.now()}_${file.name}`);
        const snapshot = await uploadBytes(storageRef, file);
        const downloadUrl = await getDownloadURL(snapshot.ref);

        await addDoc(collection(db, "flipbooks"), {
          title: title,
          pdfUrl: downloadUrl,
          userId: currentUser.uid,
          authorName: currentUser.displayName,
          createdAt: serverTimestamp()
        });

        uploadForm.reset();
        alert("Berjaya dimuat naik!");
        loadBooks();
      } catch (error) {
        alert("Ralat memuat naik: " + error.message);
      } finally {
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('upload-progress').classList.add('hidden');
      }
    });

    async function loadBooks() {
      const booksGrid = document.getElementById('books-grid');
      booksGrid.innerHTML = 'Memuatkan...';
      try {
        const q = query(collection(db, "flipbooks"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        booksGrid.innerHTML = '';
        if (querySnapshot.empty) {
          booksGrid.innerHTML = 'Tiada buku dijumpai.';
          return;
        }
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const div = document.createElement('div');
          div.className = "bg-white p-5 rounded-xl border shadow-sm";
          div.innerHTML = `
            <h3 class="font-bold mb-2">${data.title}</h3>
            <button class="view-btn bg-indigo-50 text-indigo-600 px-4 py-2 rounded" data-url="${data.pdfUrl}" data-title="${data.title}">Buka</button>
          `;
          booksGrid.appendChild(div);
        });

        document.querySelectorAll('.view-btn').forEach(btn => {
          btn.addEventListener('click', (e) => openViewer(e.target.dataset.url, e.target.dataset.title));
        });
      } catch (error) {
        booksGrid.innerHTML = 'Gagal memuatkan data.';
      }
    }

    document.getElementById('close-viewer-btn').addEventListener('click', () => {
      document.getElementById('viewer-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('hidden');
      document.getElementById('upload-section').classList.remove('hidden');
      if (pageFlipInstance) pageFlipInstance.destroy();
    });

    async function openViewer(pdfUrl, title) {
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('upload-section').classList.add('hidden');
      document.getElementById('viewer-section').classList.remove('hidden');
      document.getElementById('viewer-title').textContent = title;
      
      const container = document.getElementById('flipbook');
      container.innerHTML = 'Memproses PDF...';

      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
        container.innerHTML = '';

        const pages = [];
        for (let i = 1; i <= pdf.numPages; i++) {
          const pageDiv = document.createElement('div');
          pageDiv.className = 'page bg-white flex items-center justify-center';
          const canvas = document.createElement('canvas');
          pageDiv.appendChild(canvas);
          container.appendChild(pageDiv);
          pages.push({ pageNum: i, canvas: canvas, pageDiv: pageDiv });
        }

        pageFlipInstance = new St.PageFlip(container, {
          width: 450, height: 600, size: "stretch",
          minWidth: 315, maxWidth: 1000, minHeight: 420, maxHeight: 1350,
          showCover: true, mobileScrollSupport: false
        });

        pageFlipInstance.loadFromHTML(document.querySelectorAll('.page'));

        for (const item of pages) {
          const page = await pdf.getPage(item.pageNum);
          const viewport = page.getViewport({ scale: 1.5 });
          const context = item.canvas.getContext('2d');
          item.canvas.height = viewport.height;
          item.canvas.width = viewport.width;
          item.canvas.style.width = "100%";
          item.canvas.style.height = "100%";
          await page.render({ canvasContext: context, viewport: viewport }).promise;
        }

        document.getElementById('prev-page').onclick = () => pageFlipInstance.flipPrev();
        document.getElementById('next-page').onclick = () => pageFlipInstance.flipNext();
      } catch (error) {
        container.innerHTML = 'Gagal memaparkan PDF.';
      }
    }
  </script>
</body>
		</html>
