<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFlipbook - Sistem Pengurusan Buku Selak Interaktif</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    #viewer-section { background-color: #e5e7eb; min-height: 100vh; }
    .flipbook-container { width: 100%; max-width: 1200px; height: 85vh; min-height: 600px; margin: 0 auto; position: relative; }
    .page { background-color: white; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0,0,0,0.1), inset 0 0 15px rgba(0,0,0,0.03); }
    .page.--left { border-right: 1px solid rgba(0,0,0,0.1); }
    .page.--right { border-left: 1px solid rgba(0,0,0,0.1); }
    canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: -webkit-optimize-contrast; }

    .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; border-radius: 50%; background-color: rgba(255, 255, 255, 0.8); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; z-index: 20; font-size: 24px; color: #4b5563; }
    .nav-arrow:hover { background-color: white; transform: translateY(-50%) scale(1.1); color: #111827; }
    .nav-arrow-left { left: -60px; }
    .nav-arrow-right { right: -60px; }
    @media (max-width: 768px) { .nav-arrow-left { left: 10px; } .nav-arrow-right { right: 10px; } }

    .floating-toolbar { position: absolute; top: 20px; right: 20px; background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); padding: 8px 16px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; gap: 15px; z-index: 30; }
    .floating-toolbar button { color: #4b5563; transition: color 0.2s; display: flex; align-items: center; justify-content: center; padding: 5px; }
    .floating-toolbar button:hover { color: #4f46e5; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-animate { animation: fadeIn 0.3s ease-out forwards; }
    
    /* Custom Scrollbar for Dropdowns */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
  </style>
</head>
<body class="min-h-screen flex flex-col relative">

  <nav id="main-nav" class="bg-indigo-600 text-white shadow-md p-4 transition-all duration-300">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2 cursor-pointer" onclick="window.location.href=window.location.pathname">
        <span>📖</span> MyFlipbook
      </h1>
      <div id="auth-section">
        <button id="login-btn" class="bg-white text-indigo-600 px-4 py-2 rounded-lg font-semibold shadow hover:bg-gray-100 transition">
          Log Masuk
        </button>
        <div id="user-info" class="hidden flex items-center gap-3">
          <span id="user-name" class="text-sm font-medium"></span>
          <button id="logout-btn" class="bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded text-sm transition">
            Log Keluar
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div id="ai-chat-modal" class="hidden fixed bottom-6 right-6 w-80 bg-white rounded-xl shadow-2xl border border-indigo-100 flex flex-col overflow-hidden z-[60] transition-all transform origin-bottom-right">
    <div class="bg-indigo-600 text-white p-3 flex justify-between items-center cursor-pointer" id="ai-chat-header">
      <h3 class="font-bold flex items-center gap-2"><span class="text-xl">✨</span> Gemini Assistant</h3>
      <button id="close-ai-btn" class="text-white hover:text-gray-200 transition">✕</button>
    </div>
    <div class="p-3 bg-indigo-50 border-b border-indigo-100 text-xs text-indigo-800">
      <p>Masukkan API Key Gemini anda untuk bersembang.</p>
      <input type="password" id="gemini-api-key" placeholder="API Key..." class="w-full mt-2 p-1.5 border border-indigo-300 rounded text-xs focus:outline-none focus:border-indigo-500">
    </div>
    <div id="chat-messages" class="flex-grow p-4 overflow-y-auto h-64 bg-gray-50 flex flex-col gap-3 text-sm">
      <div class="self-start bg-gray-200 text-gray-800 rounded-lg rounded-tl-none p-3 max-w-[85%] shadow-sm">
        Hai! Saya pembantu AI. Ada bahagian buku yang anda kurang faham?
      </div>
    </div>
    <form id="ai-form" class="p-3 bg-white border-t border-gray-200 flex gap-2">
      <input type="text" id="ai-input" placeholder="Tanya sesuatu..." class="flex-grow p-2 border border-gray-300 rounded-lg focus:outline-none text-sm">
      <button type="submit" id="ai-submit-btn" class="bg-indigo-600 text-white px-3 py-2 rounded-lg hover:bg-indigo-700 transition">Kirim</button>
    </form>
  </div>

  <main id="main-content" class="max-w-6xl mx-auto p-6 flex-grow w-full relative transition-all duration-300">
    
    <!-- Upload Section -->
    <section id="upload-section" class="hidden bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-6">
      <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
        <span>📤</span> Muat Naik PDF Baru
      </h2>
      <form id="upload-form" class="flex flex-col md:flex-row gap-4 items-center">
        <input type="text" id="book-title" placeholder="Tajuk Buku Selak (cth: Nota Sejarah)" required
               class="w-full md:w-1/2 p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
        <input type="file" id="pdf-file" accept="application/pdf" required
               class="w-full md:w-1/3 p-2 border border-gray-300 rounded-lg text-sm bg-gray-50">
        <button type="submit" id="submit-btn" 
                class="w-full md:w-auto bg-indigo-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-sm">
          Muat Naik
        </button>
      </form>
      <div id="upload-progress" class="hidden mt-4 text-sm text-indigo-600 font-medium">Memproses dan memuat naik PDF...</div>
    </section>

    <!-- File Management Dashboard -->
    <section id="dashboard-section">
      <!-- Breadcrumbs & Action Header -->
      <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
          <div id="breadcrumb-container" class="flex items-center gap-2 text-gray-600 text-sm font-semibold mb-3 md:mb-0">
              <span class="cursor-pointer hover:text-indigo-600 flex items-center gap-1 text-lg" onclick="navigateFolder('root', 'Utama')">🏠 Utama</span>
              <!-- Dynamically injected breadcrumbs go here -->
          </div>
          <div class="flex gap-2">
              <button id="btn-create-folder" class="hidden bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                  <span>📁</span> Folder Baru
              </button>
              <button id="refresh-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold transition">
                  ↻ Segar
              </button>
          </div>
      </div>

      <!-- Grid Content -->
      <div id="books-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div class="col-span-full text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">
          <p class="text-gray-500 mb-2">Sila log masuk untuk melihat fail anda.</p>
        </div>
      </div>
    </section>
  </main>

  <section id="viewer-section" class="hidden fixed inset-0 z-[80] flex flex-col items-center justify-center">
      <div class="floating-toolbar">
          <button id="open-ai-from-viewer" title="Tanya AI" class="text-2xl font-bold flex items-center gap-2 px-2">
             <span class="text-xl">✨</span> <span class="text-sm font-semibold hidden md:block">Bantuan AI</span>
          </button>
          <div class="w-px h-6 bg-gray-300 self-center"></div>
          <button id="close-viewer-btn" title="Tutup" class="text-2xl font-bold flex items-center gap-2 px-2">
              <span>✕</span> <span class="text-sm font-semibold hidden md:block">Tutup</span>
          </button>
      </div>

      <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-white bg-opacity-80 backdrop-blur px-6 py-2 rounded-full shadow-sm text-sm font-medium text-gray-700 z-30 flex items-center gap-4 border border-gray-200">
          <span id="viewer-title" class="truncate max-w-[200px] md:max-w-md font-bold"></span>
          <div class="w-px h-4 bg-gray-400"></div>
          <span id="page-counter">Bersedia...</span>
      </div>

      <div class="w-full px-4 md:px-20 h-full flex items-center justify-center relative">
          <!-- Loading dan Anak Panah diasingkan dari wrapper -->
          <div id="loading-indicator" class="absolute inset-0 flex flex-col items-center justify-center z-[60] bg-gray-100 bg-opacity-75 hidden">
             <svg class="animate-spin h-10 w-10 text-indigo-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
               <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
               <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
             </svg>
             <span id="loading-text" class="text-gray-800 font-medium bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200">Menyediakan pemapar...</span>
          </div>
          
          <button id="prev-page" class="nav-arrow nav-arrow-left hidden">◀</button>
          
          <div id="flipbook-wrapper" class="w-full h-full flex items-center justify-center">
              <div id="flipbook" class="flipbook-container flex items-center justify-center"></div>
          </div>

          <button id="next-page" class="nav-arrow nav-arrow-right hidden">▶</button>
      </div>
  </section>

  <!-- Universal Modal -->
  <div id="custom-modal-overlay" class="hidden fixed inset-0 bg-black bg-opacity-60 z-[100] flex items-center justify-center backdrop-blur-sm">
      <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md m-4 modal-animate flex flex-col">
          <div class="flex justify-between items-center mb-4">
              <h3 id="modal-title" class="text-xl font-bold text-gray-800"></h3>
              <button id="modal-close-icon" class="text-gray-400 hover:text-red-500 transition text-2xl leading-none">&times;</button>
          </div>
          <div id="modal-content" class="mb-6 text-gray-600 text-sm"></div>
          <div class="flex justify-end gap-3 mt-auto">
              <button id="modal-cancel-btn" class="px-5 py-2 text-sm font-semibold text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition">Batal</button>
              <button id="modal-confirm-btn" class="px-5 py-2 text-sm font-semibold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition">OK</button>
          </div>
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, deleteDoc, doc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-storage.js";

    // Konfigurasi Firebase Anda
    const firebaseConfig = {
      apiKey: "AIzaSyDPLNOcIsmNlk2caaX-2ftsKCTcnyPWyTc",
      authDomain: "myflipbook-46cdc.firebaseapp.com",
      projectId: "myflipbook-46cdc",
      storageBucket: "myflipbook-46cdc.firebasestorage.app",
      messagingSenderId: "995308025030",
      appId: "1:995308025030:web:a40e1f790af1b9873713c7",
      measurementId: "G-7QD937QKZY"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let pageFlipInstance = null;
    
    // Sistem Pengurusan Negeri (State Management)
    let currentFolderId = 'root';
    let breadcrumbPath = [{ id: 'root', name: 'Utama' }];
    let allUserFolders = []; // Cache untuk pilihan "Move to Folder"

    const customModal = {
        overlay: document.getElementById('custom-modal-overlay'),
        title: document.getElementById('modal-title'),
        content: document.getElementById('modal-content'),
        btnCancel: document.getElementById('modal-cancel-btn'),
        btnConfirm: document.getElementById('modal-confirm-btn'),
        closeIcon: document.getElementById('modal-close-icon'),
        
        show: function(title, contentHtml, confirmText, confirmClass, onConfirm) {
            this.title.textContent = title;
            this.content.innerHTML = contentHtml;
            this.btnConfirm.textContent = confirmText;
            this.btnConfirm.className = `px-5 py-2 text-sm font-semibold text-white rounded-lg transition ${confirmClass}`;
            
            // Bersihkan Event Listener Lama dengan Clone Node
            const newConfirmBtn = this.btnConfirm.cloneNode(true);
            this.btnConfirm.parentNode.replaceChild(newConfirmBtn, this.btnConfirm);
            this.btnConfirm = newConfirmBtn;
            
            const closeFn = () => this.overlay.classList.add('hidden');
            
            this.btnCancel.onclick = closeFn;
            this.closeIcon.onclick = closeFn;
            
            this.btnConfirm.onclick = async () => {
                const btnOriginalText = this.btnConfirm.textContent;
                this.btnConfirm.textContent = 'Memproses...';
                this.btnConfirm.disabled = true;
                
                try { await onConfirm(); } 
                catch(e) { console.error(e); }
                
                this.btnConfirm.textContent = btnOriginalText;
                this.btnConfirm.disabled = false;
                closeFn();
            };
            
            this.overlay.classList.remove('hidden');
        },
        
        prompt: function(title, placeholder, defaultValue, onConfirm) {
            const inputHtml = `<input type="text" id="modal-input-val" value="${defaultValue}" placeholder="${placeholder}" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none mt-2">`;
            this.show(title, inputHtml, 'Simpan', 'bg-indigo-600 hover:bg-indigo-700', () => {
                const val = document.getElementById('modal-input-val').value.trim();
                if(val) onConfirm(val);
            });
        },
        
        confirm: function(title, message, onConfirm) {
            this.show(title, `<p>${message}</p>`, 'Padam', 'bg-red-600 hover:bg-red-700', onConfirm);
        },

        share: function(title, directUrl, embedUrl) {
            const html = `
                <div class="space-y-4">
                    <p class="text-xs font-bold text-gray-500 truncate mb-2">${title}</p>
                    <div><label class="block text-xs font-semibold text-gray-600 mb-1">Pautan Langsung</label><div class="flex gap-2"><input type="text" id="share-link-input" value="${directUrl}" readonly class="flex-grow p-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm"><button onclick="document.getElementById('share-link-input').select(); document.execCommand('copy');" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-200">Salin</button></div></div>
                    <div><label class="block text-xs font-semibold text-gray-600 mb-1">Kod Benam (Embed)</label><textarea readonly rows="2" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg text-xs font-mono resize-none">${embedUrl}</textarea></div>
                    <div class="pt-4 flex flex-col items-center"><label class="block text-xs font-semibold text-gray-600 mb-2">Kod QR</label><div class="bg-white p-2 border border-gray-200 rounded-lg"><div id="qrcode-box"></div></div></div>
                </div>`;
            this.show("Kongsi Awam", html, "Tutup", "bg-gray-800 hover:bg-gray-900", () => {});
            setTimeout(() => {
                const qrBox = document.getElementById('qrcode-box');
                if(qrBox) { qrBox.innerHTML = ''; new QRCode(qrBox, { text: directUrl, width: 128, height: 128, colorDark : "#4f46e5" }); }
            }, 100);
        }
    };

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const createFolderBtn = document.getElementById('btn-create-folder');

    loginBtn.addEventListener('click', async () => {
        try { await signInWithPopup(auth, googleProvider); } 
        catch (error) { console.warn("Ralat Log Masuk", error); }
    });
    logoutBtn.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      const booksGrid = document.getElementById('books-grid');
      
      if (user) {
        loginBtn.classList.add('hidden');
        document.getElementById('user-info').classList.remove('hidden');
        document.getElementById('user-name').textContent = user.displayName;
        document.getElementById('upload-section').classList.remove('hidden');
        createFolderBtn.classList.remove('hidden');
        
        const urlParams = new URLSearchParams(window.location.search);
        if (!urlParams.get('b64')) loadDashboard(); // Load if not opening shared link
      } else {
        loginBtn.classList.remove('hidden');
        document.getElementById('user-info').classList.add('hidden');
        document.getElementById('upload-section').classList.add('hidden');
        createFolderBtn.classList.add('hidden');
        booksGrid.innerHTML = '<div class="col-span-full text-center py-10 bg-white rounded-xl border border-dashed border-gray-300"><p class="text-gray-500">Sila log masuk untuk menguruskan fail.</p></div>';
      }
    });

    document.getElementById('refresh-btn').addEventListener('click', () => loadDashboard());

    const aiChatModal = document.getElementById('ai-chat-modal');
    let chatHistory = []; 
    function toggleChat() { aiChatModal.classList.toggle('hidden'); }
    document.getElementById('close-ai-btn').addEventListener('click', toggleChat);
    document.getElementById('open-ai-from-viewer').addEventListener('click', toggleChat);

    document.getElementById('ai-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const aiInput = document.getElementById('ai-input');
        const chatMessages = document.getElementById('chat-messages');
        const promptText = aiInput.value.trim();
        const apiKey = document.getElementById('gemini-api-key').value.trim();
        const btn = document.getElementById('ai-submit-btn');

        if(!promptText) return;
        if(!apiKey) return customModal.show("Perhatian", "Sila masukkan API Key Gemini di ruang tetapan chat.", "Faham", "bg-indigo-600", ()=>{});

        chatMessages.innerHTML += `<div class="self-end bg-indigo-600 text-white rounded-lg rounded-tr-none p-3 max-w-[85%] shadow-sm whitespace-pre-wrap">${promptText}</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;
        aiInput.value = ''; btn.disabled = true; btn.innerHTML = '...';
        
        chatHistory.push({ role: "user", parts: [{ text: promptText }] });

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: chatHistory, systemInstruction: { parts: [{ text: "Jawab soalan tentang dokumen ini. Ringkaskan dalam Bahasa Melayu." }] } })
            });
            if (!res.ok) throw new Error("Ralat Rangkaian AI");
            const result = await res.json();
            const aiText = result?.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, ralat.";
            chatMessages.innerHTML += `<div class="self-start bg-gray-200 text-gray-800 rounded-lg rounded-tl-none p-3 max-w-[85%] shadow-sm whitespace-pre-wrap">${aiText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>`;
            chatHistory.push({ role: "model", parts: [{ text: aiText }] });
        } catch (error) {
            chatMessages.innerHTML += `<div class="self-start bg-red-100 text-red-700 p-2 text-xs rounded-lg">Ralat: ${error.message}</div>`;
            chatHistory.pop();
        }
        btn.disabled = false; btn.innerHTML = 'Kirim'; chatMessages.scrollTop = chatMessages.scrollHeight;
    });

    // --- 1. CREATE FOLDER ---
    createFolderBtn.addEventListener('click', () => {
        customModal.prompt("Cipta Folder Baru", "Nama Folder", "", async (folderName) => {
            await addDoc(collection(db, "folders"), { 
                name: folderName, 
                userId: currentUser.uid, 
                parentId: currentFolderId, 
                createdAt: serverTimestamp() 
            });
            loadDashboard();
        });
    });

    // --- 2. UPLOAD FILE ---
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser) return;
        const file = document.getElementById('pdf-file').files[0];
        const title = document.getElementById('book-title').value;
        if (!file) return;

        const btn = document.getElementById('submit-btn');
        const prog = document.getElementById('upload-progress');
        btn.disabled = true; prog.classList.remove('hidden'); prog.textContent = "Memuat naik...";

        try {
            const storagePath = `pdfs/${currentUser.uid}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
            const storageRef = ref(storage, storagePath);
            const task = uploadBytesResumable(storageRef, file);
            
            task.on('state_changed', 
              (snap) => { prog.textContent = `Memuat naik... ${Math.round((snap.bytesTransferred/snap.totalBytes)*100)}%`; },
              (err) => { customModal.show("Ralat", err.message, "Tutup", "bg-red-600", ()=>{}); btn.disabled = false; prog.classList.add('hidden'); },
              async () => {
                prog.textContent = "Menyimpan rekod...";
                const url = await getDownloadURL(task.snapshot.ref);
                await addDoc(collection(db, "flipbooks"), { 
                    title, pdfUrl: url, storagePath, 
                    authorName: currentUser.displayName, userId: currentUser.uid, 
                    folderId: currentFolderId, createdAt: serverTimestamp() 
                });
                document.getElementById('upload-form').reset(); loadDashboard();
                btn.disabled = false; prog.classList.add('hidden');
              }
            );
        } catch (e) { customModal.show("Ralat", e.message, "Tutup", "bg-red-600", ()=>{}); btn.disabled=false; }
    });

    // Buat fungsi tersedia di window (Global) supaya event onclick HTML berfungsi
    window.navigateFolder = (id, name) => {
        if(id === 'root') { breadcrumbPath = [{ id: 'root', name: 'Utama' }]; } 
        else {
            // Potong breadcrumb jika klik pada sejarah lama, atau tambah baru
            const idx = breadcrumbPath.findIndex(b => b.id === id);
            if(idx > -1) breadcrumbPath = breadcrumbPath.slice(0, idx + 1);
            else breadcrumbPath.push({ id, name });
        }
        currentFolderId = id;
        loadDashboard();
    };

    async function loadDashboard() {
        const grid = document.getElementById('books-grid');
        grid.innerHTML = '<div class="col-span-full py-10 text-center text-gray-500">Memuatkan fail dan folder...</div>';
        
        // Render Breadcrumbs
        const bcContainer = document.getElementById('breadcrumb-container');
        bcContainer.innerHTML = breadcrumbPath.map((b, i) => `
            <span class="cursor-pointer hover:text-indigo-600 flex items-center gap-1 ${i===0?'text-lg':''}" onclick="navigateFolder('${b.id}', '${b.name}')">
                ${i===0?'🏠 ':''} ${b.name}
            </span>
            ${i < breadcrumbPath.length - 1 ? '<span class="text-gray-400">/</span>' : ''}
        `).join('');

        try {
            // Ambil SEMUA folder milik user (untuk caching Move Modal & render current view)
            const fQuery = query(collection(db, "folders"), where("userId", "==", currentUser.uid));
            const fSnap = await getDocs(fQuery);
            allUserFolders = fSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // Ambil SEMUA fail milik user
            const bQuery = query(collection(db, "flipbooks"), where("userId", "==", currentUser.uid));
            const bSnap = await getDocs(bQuery);
            let allBooks = bSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            // Sort by Date locally to avoid forcing Firestore Index creation for users
            allBooks.sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));

            // Filter untuk folder dan fail dalam direktori SEMASA sahaja
            const currentFolders = allUserFolders.filter(f => (f.parentId || 'root') === currentFolderId);
            const currentBooks = allBooks.filter(b => (b.folderId || 'root') === currentFolderId);

            grid.innerHTML = '';
            if (currentFolders.length === 0 && currentBooks.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500 border border-dashed border-gray-300 rounded-xl">Folder ini kosong.</div>';
                return;
            }

            // 1. Render Folders
            currentFolders.forEach(f => {
                grid.innerHTML += `
                <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200 shadow-sm hover:shadow-md transition flex flex-col justify-between group">
                    <div class="cursor-pointer flex-grow text-center" onclick="navigateFolder('${f.id}', '${f.name.replace(/'/g, "\\'")}')">
                        <div class="text-5xl mb-2 group-hover:scale-110 transition-transform">📁</div>
                        <h3 class="font-bold text-gray-800 text-sm truncate" title="${f.name}">${f.name}</h3>
                    </div>
                    <div class="flex gap-1 mt-3 pt-3 border-t border-yellow-200/50 justify-center">
                        <button class="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 p-1.5 rounded text-xs px-3" onclick="renameFolder('${f.id}', '${f.name.replace(/'/g, "\\'")}')">Tukar Nama</button>
                        <button class="bg-red-50 hover:bg-red-100 text-red-600 p-1.5 rounded text-xs px-3" onclick="deleteFolder('${f.id}')">Padam</button>
                    </div>
                </div>`;
            });

            const currentUrl = window.location.origin + window.location.pathname;

            // 2. Render Books
            currentBooks.forEach(b => {
                const b64 = btoa(b.pdfUrl);
                const shareUrl = `${currentUrl}?b64=${b64}&title=${encodeURIComponent(b.title)}`;
                const embedUrl = `<iframe src="${shareUrl}" width="100%" height="600" frameborder="0" allowfullscreen></iframe>`;
                
                grid.innerHTML += `
                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition flex flex-col justify-between">
                    <div class="mb-3">
                        <div class="h-24 bg-indigo-50 border border-indigo-100 rounded-lg mb-3 flex items-center justify-center text-4xl shadow-inner">📘</div>
                        <h3 class="font-bold text-gray-800 text-sm leading-tight line-clamp-2 mb-1" title="${b.title}">${b.title}</h3>
                        <p class="text-[10px] text-gray-400">${new Date(b.createdAt?.toDate()||Date.now()).toLocaleDateString()}</p>
                    </div>
                    
                    <!-- Action Bar (Buka Utama) -->
                    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm py-2 rounded-lg font-semibold shadow-sm mb-2" onclick="openViewer('${b.pdfUrl}', '${b.title.replace(/'/g, "\\'")}')">Buka Buku</button>
                    
                    <!-- Management Tools (Bawah) -->
                    <div class="grid grid-cols-4 gap-1">
                        <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 p-1.5 rounded text-xs flex items-center justify-center" title="Kongsi" onclick="customModal.share('${b.title.replace(/'/g, "\\'")}', '${shareUrl}', '${embedUrl.replace(/'/g, "\\'")}')">🔗</button>
                        <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 p-1.5 rounded text-xs flex items-center justify-center" title="Tukar Nama" onclick="renameBook('${b.id}', '${b.title.replace(/'/g, "\\'")}')">✏️</button>
                        <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 p-1.5 rounded text-xs flex items-center justify-center" title="Pindah Folder" onclick="moveBook('${b.id}')">📂</button>
                        <button class="bg-red-50 hover:bg-red-100 text-red-600 p-1.5 rounded text-xs flex items-center justify-center" title="Padam" onclick="deleteBook('${b.id}', '${b.storagePath || ''}')">🗑️</button>
                    </div>
                </div>`;
            });

        } catch (e) { grid.innerHTML = `<div class="col-span-full text-red-500 bg-red-50 p-4 rounded-lg border border-red-200">Ralat Memuat Data: ${e.message}</div>`; }
    }

    // Folder Actions
    window.renameFolder = (id, oldName) => {
        customModal.prompt("Tukar Nama Folder", "Nama Baru", oldName, async (newName) => {
            await updateDoc(doc(db, "folders", id), { name: newName }); loadDashboard();
        });
    };
    window.deleteFolder = (id) => {
        customModal.confirm("Padam Folder?", "Amaran: Pastikan folder ini kosong. Fail di dalamnya mungkin akan hilang dari paparan jika folder dipadam.", async () => {
            await deleteDoc(doc(db, "folders", id)); loadDashboard();
        });
    };

    // Book Actions
    window.renameBook = (id, oldTitle) => {
        customModal.prompt("Tukar Tajuk Buku", "Tajuk Baru", oldTitle, async (newTitle) => {
            await updateDoc(doc(db, "flipbooks", id), { title: newTitle }); loadDashboard();
        });
    };
    
    window.deleteBook = (docId, storagePath) => {
        customModal.confirm("Padam Fail ini?", "Fail PDF dan buku selak ini akan dipadam secara kekal.", async () => {
            await deleteDoc(doc(db, "flipbooks", docId));
            if(storagePath) {
                try { await deleteObject(ref(storage, storagePath)); } 
                catch(e) { console.warn("Fail fizikal mungkin telah tiada di awan.", e); }
            }
            loadDashboard();
        });
    };

    window.moveBook = (id) => {
        // Bina senarai <select> daripada cache allUserFolders
        let optionsHtml = `<option value="root" ${currentFolderId==='root'?'selected':''}>🏠 Direktori Utama (Root)</option>`;
        allUserFolders.forEach(f => {
            optionsHtml += `<option value="${f.id}" ${currentFolderId===f.id?'selected':''}>📁 ${f.name}</option>`;
        });
        
        const content = `
            <label class="block text-sm font-semibold text-gray-700 mb-2">Pilih Destinasi:</label>
            <select id="move-folder-select" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                ${optionsHtml}
            </select>`;
            
        customModal.show("Pindah Buku", content, "Alih Fail", "bg-indigo-600 hover:bg-indigo-700", async () => {
            const targetFolderId = document.getElementById('move-folder-select').value;
            if(targetFolderId !== currentFolderId) {
                await updateDoc(doc(db, "flipbooks", id), { folderId: targetFolderId });
                loadDashboard();
            }
        });
    };

    const viewerSection = document.getElementById('viewer-section');
    const mainNav = document.getElementById('main-nav');
    const mainContent = document.getElementById('main-content');
    
    // Shared Link Initializer
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('b64')) {
        try {
            window.openViewer(atob(urlParams.get('b64')), urlParams.get('title') || 'Buku Kongsi');
        } catch(e) { console.error("URL Rosak", e); }
    }

    document.getElementById('close-viewer-btn').addEventListener('click', () => {
        viewerSection.classList.add('hidden');
        mainNav.classList.remove('hidden');
        mainContent.classList.remove('hidden');
        
        if (pageFlipInstance) { pageFlipInstance.destroy(); pageFlipInstance = null; }
        
        // Reset Total DOM Container untuk elak masalah rendering buku seterusnya
        const wrapper = document.getElementById('flipbook-wrapper');
        wrapper.innerHTML = '<div id="flipbook" class="flipbook-container flex items-center justify-center"></div>';
        
        document.getElementById('prev-page').classList.add('hidden'); 
        document.getElementById('next-page').classList.add('hidden');
        document.getElementById('loading-indicator').style.display = 'none';
        
        if(urlParams.get('b64')) window.location.href = window.location.pathname; 
    });

    window.openViewer = async (pdfUrl, title) => {
        const wrapper = document.getElementById('flipbook-wrapper');
        wrapper.innerHTML = '<div id="flipbook" class="flipbook-container flex items-center justify-center"></div>';
        const flipContainer = document.getElementById('flipbook');

        mainNav.classList.add('hidden'); mainContent.classList.add('hidden');
        viewerSection.classList.remove('hidden');
        document.getElementById('viewer-title').textContent = title;
        
        const loading = document.getElementById('loading-indicator');
        const loadText = document.getElementById('loading-text');
        loading.style.display = 'flex'; loadText.textContent = 'Memuat turun PDF...';

        try {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
            
            loadText.textContent = 'Menyediakan halaman...';
            const firstPage = await pdf.getPage(1);
            const vp = firstPage.getViewport({ scale: 1 });
            let baseW = vp.width, baseH = vp.height;
            const ratio = baseH / baseW;
            if(baseW > 600) { baseW = 600; baseH = 600 * ratio; }

            const pagesData = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const pDiv = document.createElement('div');
                pDiv.className = 'page';
                const canvas = document.createElement('canvas');
                pDiv.appendChild(canvas);
                flipContainer.appendChild(pDiv);
                pagesData.push({ num: i, canvas: canvas });
            }

            pageFlipInstance = new St.PageFlip(flipContainer, {
                width: baseW, height: baseH, size: "stretch", 
                minWidth: 250, maxWidth: 800, minHeight: 350, maxHeight: 1200,
                showCover: true, mobileScrollSupport: false,
                maxShadowOpacity: 0.4, drawShadow: true, flippingTime: 600
            });
            pageFlipInstance.loadFromHTML(flipContainer.querySelectorAll('.page'));

            for (const item of pagesData) {
                const p = await pdf.getPage(item.num);
                const viewport = p.getViewport({ scale: 2.0 }); 
                const ctx = item.canvas.getContext('2d', {alpha: false}); 
                item.canvas.height = viewport.height; item.canvas.width = viewport.width;
                await p.render({ canvasContext: ctx, viewport: viewport }).promise;
            }

            loading.style.display = 'none';
            const prevBtn = document.getElementById('prev-page'), nextBtn = document.getElementById('next-page');
            prevBtn.classList.remove('hidden'); nextBtn.classList.remove('hidden');
            
            const pCounter = document.getElementById('page-counter');
            pCounter.textContent = `1 / ${pdf.numPages}`;
            pageFlipInstance.on('flip', (e) => pCounter.textContent = `${e.data + 1} / ${pdf.numPages}`);
            prevBtn.onclick = () => pageFlipInstance.flipPrev();
            nextBtn.onclick = () => pageFlipInstance.flipNext();

        } catch (err) {
            loadText.innerHTML = `<span class="text-red-600 font-bold">Ralat: ${err.message}</span><br><button onclick="document.getElementById('close-viewer-btn').click()" class="mt-4 bg-gray-200 px-4 py-2 rounded">Kembali</button>`;
            document.querySelector('.animate-spin').style.display = 'none';
        }
    };
  </script>
</body>
</html>
